version: "3.9"

services:
  app1:
    build: .
    container_name: app1
    hostname: app1
    expose:
      - "7653"
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://root:example@mongo:27017/gameStore?authSource=admin
      SESSION_SECRET: docker-secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKER: redpanda:9092
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  app2:
    build: .
    container_name: app2
    hostname: app2
    expose:
      - "7653"
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://root:example@mongo:27017/gameStore?authSource=admin
      SESSION_SECRET: docker-secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKER: redpanda:9092
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  app3:
    build: .
    container_name: app3
    hostname: app3
    expose:
      - "7653"
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://root:example@mongo:27017/gameStore?authSource=admin
      SESSION_SECRET: docker-secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKER: redpanda:9092
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  email-consumer:
    build: ./email-service
    container_name: email-consumer
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKER: redpanda:9092
      KAFKAJS_NO_PARTITIONER_WARNING: 1
    networks:
      - app-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: gameStore
    volumes:
      - mongo-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - app-network
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    restart: unless-stopped
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --rpc-addr=0.0.0.0:33145
      - --mode=dev-container
    ports:
      - "9092:9092"
      - "9644:9644"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "rpk topic list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  apache:
    build: ./apache
    container_name: apache
    ports:
      - "8080:8080"
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - app-network
    restart: unless-stopped

  # Apache exporter (uses mod_status endpoint you enabled)
  apache-exporter:
    image: solsson/prometheus-exporter-apache:latest
    container_name: apache-exporter
    restart: unless-stopped
    command:
      - --scrape_uri=http://apache:8080/server-status?auto
      - --log.level=info
    ports:
      - "9117:9117"
    depends_on:
      - apache
    networks:
      - app-network
 
  # Prometheus (official image; bind your config file)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - app1
      - app2
      - app3
      - email-consumer
      - apache
      - redpanda
      - mongo-exporter
      - redis-exporter
      - apache-exporter
    networks:
      - app-network

  # MongoDB exporter
  mongo-exporter:
    image: percona/mongodb_exporter:0.40
    container_name: mongo-exporter
    restart: unless-stopped
    command:
      - --mongodb.uri=mongodb://root:example@mongo:27017/?authSource=admin&ssl=false
    ports:
      - "9216:9216"
    depends_on:
      - mongo
    networks:
      - app-network

  # Redis exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    restart: unless-stopped
    command:
      - --redis.addr=redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - app-network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    name: game-exchange-network

volumes:
  mongo-data:
  redpanda-data:
  prometheus-data:
  grafana-data:
